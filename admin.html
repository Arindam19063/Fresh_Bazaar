<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Fresh Bazaar</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--primary);
        }
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }
        .form-card {
            background: white;
            padding: 2rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 6rem;
        }
        .table-card {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #f1f5f9;
        }
        th {
            background: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
        }
        .action-btns {
            display: flex;
            gap: 0.5rem;
        }
        .btn-delete {
            background: var(--danger);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .preview-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            border: 1px dashed #cbd5e1;
        }
    </style>
</head>
<body>
    <header id="main-header" class="scrolled">
        <nav class="nav-container glass">
            <a href="index.html" class="logo">
                🛒 <span style="color: var(--text-main); font-weight: 800;">Fresh</span> <span style="color: var(--primary); font-weight: 800;">Bazaar Admin</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">View Shop</a>
                <a href="admin.html" class="nav-link active">Dashboard</a>
            </div>
        </nav>
    </header>

    <div class="admin-container">
        <div class="admin-header">
            <h2>Shopkeeper Management</h2>
            <p id="total-items">Total Items: 0</p>
        </div>

        <div class="admin-grid">
            <!-- Add Item Form -->
            <div class="form-card">
                <h3 style="margin-bottom: 1.5rem;">Add New Item</h3>
                <form id="add-product-form">
                    <div class="form-group">
                        <label>Item Name (English)</label>
                        <input type="text" id="en_name" placeholder="Tomato" required>
                    </div>
                    <div class="form-group">
                        <label>Item Name (Bengali)</label>
                        <input type="text" id="bn_name" placeholder="টমেটো" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category" style="width:100%; padding: 0.75rem; border-radius: 8px; border: 1.5px solid #e2e8f0;">
                            <option value="vegetables">Vegetables</option>
                            <option value="fruits">Fruits</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Price (₹ per unit)</label>
                        <input type="number" id="price" placeholder="40" required>
                    </div>
                    <div class="form-group">
                        <label>Unit (e.g. kg, bunch)</label>
                        <input type="text" id="unit" placeholder="kg" required>
                    </div>
                    <div class="form-group">
                        <label>Product Photo</label>
                        <input type="file" id="image-input" accept="image/*" style="padding: 10px 0;">
                        <img id="image-preview" class="preview-img" alt="Preview">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;" id="submit-btn">Add to Shop</button>
                </form>
            </div>

            <!-- Items List -->
            <div class="table-card">
                <h3 style="margin-bottom: 1.5rem;">Inventory Status</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-product-list">
                        <!-- Items will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        // Image Preview logic
        document.getElementById('image-input').addEventListener('change', function(e) {
            const preview = document.getElementById('image-preview');
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        async function loadProducts() {
            const res = await fetch(`${API_URL}/products`);
            const products = await res.json();
            
            document.getElementById('total-items').textContent = `Total Items: ${products.length}`;
            
            const list = document.getElementById('admin-product-list');
            list.innerHTML = products.map(p => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <img src="${p.img}" style="width: 40px; height: 40px; border-radius: 4px; object-fit: cover;">
                            <div>
                                <strong>${p.en}</strong><br>
                                <span style="font-size: 0.8rem; color: #64748b;">${p.bn}</span>
                            </div>
                        </div>
                    </td>
                    <td>${p.category}</td>
                    <td>₹${p.price} / ${p.unit}</td>
                    <td>
                        <button class="btn ${p.stock ? 'btn-primary' : 'btn-outline'}" 
                            style="padding: 0.2rem 0.5rem; font-size: 0.7rem;" 
                            onclick="toggleStock(${p.id}, ${p.stock ? 0 : 1})">
                            ${p.stock ? 'In Stock' : 'Out of Stock'}
                        </button>
                    </td>
                    <td>
                        <button class="btn btn-delete" onclick="deleteProduct(${p.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Uploading...';

            let imageUrl = 'https://images.unsplash.com/photo-1542838132-92c53300491e?w=400&q=80'; // Default
            
            const imageFile = document.getElementById('image-input').files[0];
            
            if (imageFile) {
                const formData = new FormData();
                formData.append('image', imageFile);

                try {
                    const uploadRes = await fetch(`${API_URL}/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    const uploadData = await uploadRes.json();
                    if (uploadRes.ok) {
                        imageUrl = uploadData.imageUrl;
                    }
                } catch (err) {
                    console.error('Upload failed', err);
                }
            }

            const productData = {
                en_name: document.getElementById('en_name').value,
                bn_name: document.getElementById('bn_name').value,
                category: document.getElementById('category').value,
                price: document.getElementById('price').value,
                unit: document.getElementById('unit').value,
                img: imageUrl
            };

            const res = await fetch(`${API_URL}/products`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(productData)
            });

            if (res.ok) {
                alert('Product added successfully!');
                e.target.reset();
                document.getElementById('image-preview').style.display = 'none';
                loadProducts();
            }
            
            btn.disabled = false;
            btn.textContent = 'Add to Shop';
        });

        async function toggleStock(id, newStock) {
            await fetch(`${API_URL}/products/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stock: newStock })
            });
            loadProducts();
        }

        async function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this item?')) {
                await fetch(`${API_URL}/products/${id}`, { method: 'DELETE' });
                loadProducts();
            }
        }

        window.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
