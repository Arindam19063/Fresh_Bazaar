<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Fresh Bazaar</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f6f9fc 0%, #eef2f7 100%);
            padding: 2rem;
        }
        .auth-card {
            background: white;
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-logo {
            font-size: 2rem;
            text-decoration: none;
            display: block;
            margin-bottom: 1rem;
        }
        .tab-group {
            display: flex;
            background: #f1f5f9;
            padding: 0.25rem;
            border-radius: var(--radius-sm);
            margin-bottom: 2rem;
        }
        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        .divider span {
            padding: 0 1rem;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">🛒 <span style="color: var(--text-main); font-weight: 800;">Fresh</span> <span style="color: var(--primary); font-weight: 800;">Bazaar</span></a>
                <h2 id="auth-title" data-en="Welcome Back" data-bn="স্বাগতম">স্বাগতম</h2>
                <p style="color: var(--text-muted); margin-top: 0.5rem;" id="auth-subtitle" data-en="Login to manage your orders" data-bn="আপনার অর্ডার পরিচালনা করতে লগইন করুন">আপনার অর্ডার পরিচালনা করতে লগইন করুন</p>
            </div>

            <div class="tab-group">
                <button class="tab-btn active" onclick="setAuthMode('login')" data-en="Login" data-bn="লগইন">লগইন</button>
                <button class="tab-btn" onclick="setAuthMode('register')" data-en="Register" data-bn="রেজিস্টার">রেজিস্টার</button>
            </div>

            <form id="auth-form" onsubmit="handleFormSubmit(event)">
                <div id="register-only" style="display: none;">
                    <div class="form-group">
                        <label data-en="Full Name" data-bn="পুরো নাম">পুরো নাম</label>
                        <input type="text" id="name" placeholder="Arindam Pramanik">
                    </div>
                </div>

                <div class="form-group">
                    <label data-en="Phone Number" data-bn="ফোন নম্বর">ফোন নম্বর</label>
                    <input type="tel" id="phone" placeholder="9647969391" required>
                </div>

                <div class="form-group">
                    <label data-en="Password" data-bn="পাসওয়ার্ড">পাসওয়ার্ড</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;" id="submit-btn">
                    <span data-en="Login" data-bn="লগইন">লগইন</span>
                </button>
            </form>

            <div class="divider">
                <span data-en="OR" data-bn="অথবা">অথবা</span>
            </div>

            <p style="text-align: center; font-size: 0.9rem;">
                <a href="index.html" style="color: var(--primary); text-decoration: none;" data-en="Back to Home" data-bn="হোম পেজে ফিরে যান">হোম পেজে ফিরে যান</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let currentMode = 'login';
        
        function setAuthMode(mode) {
            currentMode = mode;
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const regFields = document.getElementById('register-only');
            const submitBtn = document.getElementById('submit-btn');
            const tabs = document.querySelectorAll('.tab-btn');

            tabs.forEach(t => t.classList.remove('active'));
            if (mode === 'login') {
                tabs[0].classList.add('active');
                title.textContent = currentLang === 'en' ? 'Welcome Back' : 'স্বাগতম';
                subtitle.textContent = currentLang === 'en' ? 'Login to manage your orders' : 'আপনার অর্ডার পরিচালনা করতে লগইন করুন';
                regFields.style.display = 'none';
                submitBtn.innerHTML = `<span>${currentLang === 'en' ? 'Login' : 'লগইন'}</span>`;
            } else {
                tabs[1].classList.add('active');
                title.textContent = currentLang === 'en' ? 'Create Account' : 'অ্যাকাউন্ট তৈরি করুন';
                subtitle.textContent = currentLang === 'en' ? 'Join Fresh Bazaar today' : 'আজই ফ্রেশ বাজারে যোগ দিন';
                regFields.style.display = 'block';
                submitBtn.innerHTML = `<span>${currentLang === 'en' ? 'Register' : 'রেজিস্টার'}</span>`;
            }
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;

            const endpoint = currentMode === 'login' ? '/auth/login' : '/auth/register';
            const payload = currentMode === 'login' ? { phone, password } : { phone, password, name };

            try {
                const res = await fetch(`http://localhost:3000/api${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Auth failed');

                if (currentMode === 'login') {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    alert(currentLang === 'en' ? 'Registration successful! Please login.' : 'রেজিস্ট্রেশন সফল হয়েছে! লগইন করুন।');
                    setAuthMode('login');
                }
            } catch (err) {
                alert(err.message);
            }
        }
        
        // Initialize language
        window.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('lang') || 'bn';
            setLanguage(savedLang);
        });
    </script>
</body>
</html>
